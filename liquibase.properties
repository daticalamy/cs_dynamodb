##
##      The liquibase.properties file stores properties which do not change often,
##      such as database connection information. Properties stored here save time
##      and reduce risk of mistyped command line arguments.
##      Learn more: https://docs.liquibase.com/concepts/connections/creating-config-properties.html
####
####
##   Note about relative and absolute paths:
##      The liquibase.properties file requires paths for some properties.
##      The classpath is the path/to/resources (ex. src/main/resources).
##      The changeLogFile path is relative to the classpath.
##      The url H2 example below is relative to 'pwd' resource.
####

#### Liquibase Pro Key Information ####
# Learn more, contact support, or get or renew a Pro Key at https://www.liquibase.com/trial
# liquibase.licenseKey: <SET AS ENVIRONMENT VARIABLE LIQUIBASE_LICENSE_KEY>

# Enter the path for your changelog file.
#changeLogFile=changelogs/changelog.xml
changelogFile=changelogs/changelog.xml

#Do not specify classpath like this. There is an issue. Use the lib folder.
#classpath: liquibase-drivers/liquibase-commercial-dynamodb-1.1.0.jar

#### Enter the Target database 'url' information  ####
liquibase.command.url=https://dynamodb.us-east-1.amazonaws.com
# Or <SET AS ENVIRONMENT VARIABLE LIQUIBASE_COMMAND_URL>

# Following properties are for DynamoDB usage
# liquibase.dynamodb.waiters.enabled=false
liquibase.dynamodb.waiter.update.maxAttempts=100

# Enter the Schema to house the Liquibase Tracking tables.
liquibase.liquibaseSchemaName: LIQUIBASE

#### Enter the Source Database 'referenceUrl' information ####
## The source database is the baseline or reference against which your target database is compared for diff/diffchangelog commands.

# Enter URL for the source database
#liquibase.command.referenceUrl: jdbc:oracle:thin:@cs-oracledb.liquibase.net:1521/BANCO_PROD

# Enter the username for your source database
#liquibase.command.referenceUsername: liquibase_user

# Enter the password for your source database
#liquibase.command.referencePassword: liquibase_user

# Logging Configuration
# logLevel controls the amount of logging information generated. If not set, the default logLevel is INFO.
# Valid values, from least amount of logging to most, are:
#   OFF, ERROR, WARN, INFO, DEBUG, TRACE, ALL
# If you are having problems, setting the logLevel to DEBUG and re-running the command can be helpful.
logLevel: INFO
liquibase.logFormat=JSON_PRETTY
liquibase.logFile=logs/log.json

# The logFile property controls where logging messages are sent. If this is not set, then logging messages are
# displayed on the console. If this is set, then messages will be sent to a file with the given name.
# logFile: liquibase.log

#### Checks Settings ####
liquibase.command.checks.run.checksSettingsFile=checks/liquibase.checks-settings.conf
liquibase.command.checks.show.checksSettingsFile=checks/liquibase.checks-settings.conf

#### Flow Settings ####
liquibase.command.flowFile=flows/liquibase.flowfile.yaml

##  Get documentation at docs.liquibase.com       ##
##  Get certified courses at learn.liquibase.com  ##
##  Get support at liquibase.com/support         ##

liquibase.reports.enabled=true
liquibase.reports.path=reports
liquibase.command.autoUpdate=off
liquibase.dbclhistory.enabled=true