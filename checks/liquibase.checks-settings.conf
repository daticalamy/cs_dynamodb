rules:
- description: Alerts when SQL code contains GRANT statements that assign database
    privileges to users or roles, helping review potential security vulnerabilities
    by ensuring permissions are appropriately scoped and do not provide unintended
    access.
  enabled: false
  id: '38fc7edf-9a60-3d00-8b40-23c7e719745f'
  name: Warn on Detection of 'GRANT' Statements
  severity: '0'
  shortName: SqlGrantWarn
- description: Flags REVOKE statements in SQL that remove database privileges from
    users or roles, allowing you to verify that removing these permissions will not
    accidentally break application functionality or prevent legitimate access to critical
    data.
  enabled: false
  id: '0b73828f-2e8d-3c36-b1c3-7153bcb6f160'
  name: Warn on Detection of 'REVOKE' Statements
  severity: '0'
  shortName: SqlRevokeWarn
- description: Detects USE DATABASE statements in SQL scripts to help maintain portability
    and prevent unintended database switching, ensuring changesets do not accidentally
    execute against the wrong database context or create deployment issues across
    different environments.
  enabled: false
  id: '9197d8c1-86e7-3277-b3d9-677c2f2b4213'
  name: Warn on Detection of 'USE DATABASE' statements
  severity: '0'
  shortName: WarnOnUseDatabase
- description: Warns when DROP TABLE is detected, providing a safety checkpoint to
    confirm the deletion is intentional and prevent accidental data loss from removing
    important or referenced tables.
  enabled: false
  id: '218fa8f2-ea81-308e-b010-5c25cf62c8fc'
  name: Warn when 'DROP TABLE' detected
  severity: '0'
  shortName: ChangeDropTableWarn
- description: Alerts when DROP COLUMN is detected, giving you an opportunity to verify
    the column removal will not cause data loss or break dependencies, and that both
    necessary data and application code are migrated or updated.
  enabled: false
  id: '223ed841-5f53-3eab-8ca8-f66393c689a4'
  name: Warn when 'DROP COLUMN' detected
  severity: '0'
  shortName: ChangeDropColumnWarn
- description: Flags any changes that modify the data type of an existing column,
    helping avoid data truncation or loss when converting between incompatible types,
    such as changing from a larger to smaller size or from text to numeric formats.
  enabled: false
  id: 'e98e0a4d-0582-360b-a89f-37b2f65e65d2'
  name: Warn when 'MODIFY <column>' detected
  severity: '0'
  shortName: ModifyDataTypeWarn
- description: Identifies SQL queries that use SELECT * to retrieve all columns from
    a table, encouraging best practices for query performance and maintainability
    by requiring developers to explicitly specify which columns they actually need
    rather than retrieving unnecessary data.
  enabled: false
  id: 'b36ff4e4-b647-3bfa-b73f-33c7a588c567'
  name: Warn on Detection of 'SELECT *'
  severity: '0'
  shortName: SqlSelectStarWarn
- description: Allows user-defined custom Regex patterns or specific text strings
    to search for within SQL code, enabling enforcement of organization-specific coding
    standards, both detecting prohibited patterns or proving inclusion of required
    patterns, building an audit trail of development practices.
