databaseChangeLog:
- includeAll:
    path: tables
    relativeToChangelogFile: true
    errorIfMissingOrEmpty: false
- includeAll:
    path: indexes
    relativeToChangelogFile: true
    errorIfMissingOrEmpty: false
- includeAll:
    path: data
    relativeToChangelogFile: true
    errorIfMissingOrEmpty: false